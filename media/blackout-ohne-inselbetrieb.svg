<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" fill="none" stroke-linecap="round" stroke-linejoin="round" font-family="Lato, system-ui, sans-serif" role="img" aria-label="Ohne Inselbetrieb: Wechselrichter schaltet bei Netzausfall ab, keine Umschaltbox und kein Speicher vorhanden, Haus dunkel">
  <defs>
    <radialGradient id="bo-warm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Boden-Linie -->
  <line x1="30" y1="328" x2="890" y2="328" stroke="#4A4D50" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- =========== SONNE (passiv) =========== -->
  <g transform="translate(60, 55)">
    <circle r="32" fill="url(#bo-warm)"/>
    <circle r="15" fill="none" stroke="#9CA3AF" stroke-width="2"/>
    <g stroke="#9CA3AF" stroke-width="2">
      <line x1="0" y1="-24" x2="0" y2="-30"/>
      <line x1="0" y1="24" x2="0" y2="30"/>
      <line x1="-24" y1="0" x2="-30" y2="0"/>
      <line x1="24" y1="0" x2="30" y2="0"/>
      <line x1="-17" y1="-17" x2="-21" y2="-21"/>
      <line x1="17" y1="-17" x2="-21" y2="-21" transform="scale(-1 1) translate(-34 0)"/>
      <line x1="-17" y1="17" x2="-21" y2="21"/>
      <line x1="17" y1="17" x2="21" y2="21"/>
    </g>
  </g>

  <!-- =========== HAUS (dunkel) =========== -->
  <polygon points="555,140 670,55 785,140" fill="#1F2021" stroke="#6B7280" stroke-width="2"/>
  <rect x="572" y="140" width="196" height="85" fill="#1F2021" stroke="#6B7280" stroke-width="2"/>

  <!-- Fenster links — dunkel -->
  <rect x="589" y="164" width="22" height="24" fill="#1F2021" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="600" y1="164" x2="600" y2="188" stroke="#4A4D50" stroke-width="0.8"/>
  <line x1="589" y1="176" x2="611" y2="176" stroke="#4A4D50" stroke-width="0.8"/>

  <!-- Tür -->
  <rect x="660" y="180" width="32" height="45" fill="#1F2021" stroke="#6B7280" stroke-width="1.5"/>
  <circle cx="685" cy="203" r="1.5" fill="#6B7280"/>

  <!-- Fenster rechts — dunkel -->
  <rect x="729" y="164" width="22" height="24" fill="#1F2021" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="740" y1="164" x2="740" y2="188" stroke="#4A4D50" stroke-width="0.8"/>
  <line x1="729" y1="176" x2="751" y2="176" stroke="#4A4D50" stroke-width="0.8"/>

  <!-- Solarmodul (deaktiviert) -->
  <polygon points="572,118 638,70 650,84 584,132" fill="#1F2021" stroke="#6B7280" stroke-width="1.6"/>
  <g stroke="#4A4D50" stroke-width="0.9">
    <line x1="578" y1="125" x2="644" y2="77"/>
    <line x1="595" y1="106" x2="603" y2="121"/>
    <line x1="613" y1="93" x2="621" y2="108"/>
    <line x1="630" y1="80" x2="638" y2="95"/>
  </g>

  <!-- Solarmodul-Label -->
  <line x1="650" y1="78" x2="678" y2="60" stroke="#9CA3AF" stroke-width="0.8"/>
  <text x="682" y="62" fill="#FFFFFF" font-size="12" font-weight="700">Solarmodul</text>

  <!-- =========== TECH-BOXEN unten =========== -->

  <!-- Box 1 — Wechselrichter (vorhanden aber AUS) -->
  <g>
    <rect x="65" y="225" width="120" height="70" rx="5" fill="#1F2021" stroke="#6B7280" stroke-width="1.8"/>
    <!-- DC + AC Symbole grau -->
    <line x1="90" y1="240" x2="115" y2="240" stroke="#6B7280" stroke-width="1.2"/>
    <line x1="90" y1="247" x2="115" y2="247" stroke="#6B7280" stroke-width="1.2"/>
    <text x="120" y="246" fill="#6B7280" font-size="9" font-weight="700">DC</text>
    <line x1="100" y1="255" x2="155" y2="280" stroke="#6B7280" stroke-width="0.8" stroke-dasharray="2 2"/>
    <path d="M 100 280 Q 113 270 125 280 T 150 280" fill="none" stroke="#6B7280" stroke-width="1.4"/>
    <text x="153" y="284" fill="#6B7280" font-size="9" font-weight="700">AC</text>
    <!-- LED rot (Aus / abgeschaltet) -->
    <circle cx="170" cy="234" r="3" fill="#EF4444"/>
    <circle cx="170" cy="234" r="5" fill="#EF4444" fill-opacity="0.3"/>
    <!-- großes Aus-Symbol über der Box -->
    <g transform="translate(125, 260)">
      <circle r="14" fill="#1F2021" stroke="#EF4444" stroke-width="2"/>
      <line x1="0" y1="-8" x2="0" y2="2" stroke="#EF4444" stroke-width="2"/>
      <path d="M -6 -4 A 7 7 0 1 0 6 -4" stroke="#EF4444" stroke-width="2" fill="none"/>
    </g>
  </g>
  <text x="125" y="218" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">Wechselrichter</text>
  <text x="125" y="312" fill="#EF4444" font-size="10" font-weight="700" text-anchor="middle">Sicherheits-Abschaltung</text>

  <!-- Box 2 — KEIN Speicher -->
  <g>
    <rect x="205" y="225" width="120" height="70" rx="5" fill="none" stroke="#6B7280" stroke-width="1.8" stroke-dasharray="6 4"/>
    <!-- ∅-Symbol mittig -->
    <g transform="translate(265, 260)">
      <circle r="20" fill="none" stroke="#6B7280" stroke-width="2"/>
      <line x1="-14" y1="-14" x2="14" y2="14" stroke="#6B7280" stroke-width="2"/>
    </g>
  </g>
  <text x="265" y="218" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">Speicher</text>
  <text x="265" y="312" fill="#EF4444" font-size="10" font-weight="700" text-anchor="middle">fehlt</text>

  <!-- Box 3 — KEINE Umschaltbox (rot hervorgehoben — der entscheidende Mangel) -->
  <g>
    <rect x="345" y="225" width="150" height="70" rx="6" fill="none" stroke="#EF4444" stroke-width="2.2" stroke-dasharray="6 4"/>
    <!-- ∅-Symbol mittig -->
    <g transform="translate(420, 260)">
      <circle r="22" fill="none" stroke="#EF4444" stroke-width="2.2"/>
      <line x1="-16" y1="-16" x2="16" y2="16" stroke="#EF4444" stroke-width="2.2"/>
    </g>
  </g>
  <text x="420" y="218" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">Umschaltbox</text>
  <text x="420" y="316" fill="#EF4444" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.05em">FEHLT — kein Inselbetrieb möglich</text>

  <!-- =========== PFEILE (gestrichelt grau, kein Energiefluss) =========== -->
  <path d="M 590 130 C 380 145 220 185 130 225" stroke="#4A4D50" stroke-width="1.6" stroke-dasharray="3 4" fill="none"/>
  <line x1="185" y1="260" x2="202" y2="260" stroke="#4A4D50" stroke-width="1.6" stroke-dasharray="3 4"/>
  <line x1="325" y1="260" x2="343" y2="260" stroke="#4A4D50" stroke-width="1.6" stroke-dasharray="3 4"/>
  <path d="M 495 260 Q 560 250 600 215" stroke="#4A4D50" stroke-width="1.6" stroke-dasharray="3 4" fill="none"/>

  <!-- =========== STROM-MAST RECHTS =========== -->
  <g stroke="#6B7280" stroke-width="2" fill="none">
    <line x1="845" y1="90" x2="845" y2="325"/>
    <line x1="822" y1="110" x2="868" y2="110"/>
    <line x1="822" y1="125" x2="868" y2="125"/>
    <line x1="836" y1="318" x2="845" y2="325"/>
    <line x1="854" y1="318" x2="845" y2="325"/>
  </g>
  <g fill="#6B7280">
    <circle cx="828" cy="112" r="1.8"/>
    <circle cx="845" cy="112" r="1.8"/>
    <circle cx="862" cy="112" r="1.8"/>
  </g>
  <text x="845" y="82" fill="#FFFFFF" font-size="12" font-weight="700" text-anchor="middle">Stromnetz</text>

  <!-- Stromleitung gestrichelt -->
  <path d="M 825 120 Q 700 175 500 250" stroke="#6B7280" stroke-width="1.6" stroke-dasharray="4 4" fill="none"/>

  <!-- ✕ -->
  <circle cx="660" cy="172" r="15" fill="#1F2021" stroke="#EF4444" stroke-width="2.4"/>
  <line x1="652" y1="164" x2="668" y2="180" stroke="#EF4444" stroke-width="2.6"/>
  <line x1="668" y1="164" x2="652" y2="180" stroke="#EF4444" stroke-width="2.6"/>
  <text x="660" y="200" fill="#EF4444" font-size="10" font-weight="700" text-anchor="middle">Netz aus</text>
</svg>
