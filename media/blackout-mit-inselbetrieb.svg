<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" fill="none" stroke-linecap="round" stroke-linejoin="round" font-family="Lato, system-ui, sans-serif" role="img" aria-label="Energiefluss mit Inselbetrieb: Solarmodul, Wechselrichter, Speicher und Umschaltbox versorgen das Haus autark, Stromnetz ist unterbrochen">
  <defs>
    <radialGradient id="bm-warm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bm-cool" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5BA7D1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5BA7D1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bm-hilite" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5BA7D1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5BA7D1" stop-opacity="0"/>
    </radialGradient>
    <marker id="bm-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8AC6E8"/>
    </marker>
  </defs>

  <!-- Boden-Linie -->
  <line x1="30" y1="328" x2="890" y2="328" stroke="#4A4D50" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- =========== SONNE =========== -->
  <g transform="translate(60, 55)">
    <circle r="40" fill="url(#bm-warm)"/>
    <circle r="15" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <g stroke="#F59E0B" stroke-width="2">
      <line x1="0" y1="-24" x2="0" y2="-30"/>
      <line x1="0" y1="24" x2="0" y2="30"/>
      <line x1="-24" y1="0" x2="-30" y2="0"/>
      <line x1="24" y1="0" x2="30" y2="0"/>
      <line x1="-17" y1="-17" x2="-21" y2="-21"/>
      <line x1="17" y1="-17" x2="21" y2="-21"/>
      <line x1="-17" y1="17" x2="-21" y2="21"/>
      <line x1="17" y1="17" x2="21" y2="21"/>
    </g>
  </g>

  <!-- =========== HAUS (rechts oben) =========== -->
  <polygon points="555,140 670,55 785,140" fill="#1F2021" stroke="#D1D5DB" stroke-width="2"/>
  <rect x="572" y="140" width="196" height="85" fill="#1F2021" stroke="#D1D5DB" stroke-width="2"/>

  <!-- Fenster links -->
  <ellipse cx="600" cy="178" rx="20" ry="16" fill="url(#bm-warm)"/>
  <rect x="589" y="164" width="22" height="24" fill="#F59E0B" fill-opacity="0.55" stroke="#FBBF24" stroke-width="1.2"/>
  <line x1="600" y1="164" x2="600" y2="188" stroke="#FDE68A" stroke-width="0.8"/>
  <line x1="589" y1="176" x2="611" y2="176" stroke="#FDE68A" stroke-width="0.8"/>

  <!-- Tür -->
  <rect x="660" y="180" width="32" height="45" fill="#0F2530" stroke="#D1D5DB" stroke-width="1.5"/>
  <circle cx="685" cy="203" r="1.5" fill="#D1D5DB"/>

  <!-- Fenster rechts -->
  <ellipse cx="740" cy="178" rx="20" ry="16" fill="url(#bm-warm)"/>
  <rect x="729" y="164" width="22" height="24" fill="#F59E0B" fill-opacity="0.55" stroke="#FBBF24" stroke-width="1.2"/>
  <line x1="740" y1="164" x2="740" y2="188" stroke="#FDE68A" stroke-width="0.8"/>
  <line x1="729" y1="176" x2="751" y2="176" stroke="#FDE68A" stroke-width="0.8"/>

  <!-- Solarmodul auf linker Dachschräge -->
  <ellipse cx="600" cy="102" rx="55" ry="28" fill="url(#bm-cool)"/>
  <polygon points="572,118 638,70 650,84 584,132" fill="#0F2530" stroke="#5BA7D1" stroke-width="1.6"/>
  <g stroke="#5BA7D1" stroke-width="0.9">
    <line x1="578" y1="125" x2="644" y2="77"/>
    <line x1="595" y1="106" x2="603" y2="121"/>
    <line x1="613" y1="93" x2="621" y2="108"/>
    <line x1="630" y1="80" x2="638" y2="95"/>
  </g>

  <!-- Solarmodul-Label mit Führungslinie -->
  <line x1="650" y1="78" x2="678" y2="60" stroke="#D1D5DB" stroke-width="0.8"/>
  <text x="682" y="62" fill="#FFFFFF" font-size="12" font-weight="700">Solarmodul</text>

  <!-- =========== TECH-BOXEN (unten in Reihe) =========== -->
  <!-- Box 1 — Wechselrichter -->
  <g>
    <rect x="65" y="225" width="120" height="70" rx="5" fill="#0F2530" stroke="#5BA7D1" stroke-width="1.8"/>
    <!-- DC-Eingang oben (zwei parallele Striche) -->
    <line x1="90" y1="240" x2="115" y2="240" stroke="#5BA7D1" stroke-width="1.4"/>
    <line x1="90" y1="247" x2="115" y2="247" stroke="#5BA7D1" stroke-width="1.4"/>
    <text x="120" y="246" fill="#5BA7D1" font-size="9" font-weight="700">DC</text>
    <!-- Trennlinie -->
    <line x1="100" y1="255" x2="155" y2="280" stroke="#5BA7D1" stroke-width="0.8" stroke-dasharray="2 2"/>
    <!-- AC-Ausgang (Sinus-Welle) -->
    <path d="M 100 280 Q 113 270 125 280 T 150 280" fill="none" stroke="#5BA7D1" stroke-width="1.6"/>
    <text x="153" y="284" fill="#5BA7D1" font-size="9" font-weight="700">AC</text>
    <!-- LED grün (an) -->
    <circle cx="170" cy="234" r="3" fill="#10B981"/>
    <circle cx="170" cy="234" r="5" fill="#10B981" fill-opacity="0.3"/>
  </g>
  <text x="125" y="218" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">Wechselrichter</text>
  <text x="125" y="312" fill="#9CA3AF" font-size="10" text-anchor="middle">wandelt Solarstrom um</text>

  <!-- Box 2 — Speicher -->
  <g>
    <ellipse cx="265" cy="260" rx="65" ry="35" fill="url(#bm-cool)"/>
    <rect x="205" y="225" width="120" height="70" rx="5" fill="#0F2530" stroke="#5BA7D1" stroke-width="1.8"/>
    <!-- Plus-Pol oben -->
    <rect x="252" y="220" width="26" height="5" fill="#5BA7D1"/>
    <!-- Akku-Füllstand (mehrere Zellen-Balken) -->
    <rect x="215" y="240" width="20" height="48" fill="#5BA7D1" fill-opacity="0.75"/>
    <rect x="240" y="240" width="20" height="48" fill="#5BA7D1" fill-opacity="0.75"/>
    <rect x="265" y="240" width="20" height="48" fill="#5BA7D1" fill-opacity="0.75"/>
    <rect x="290" y="240" width="20" height="48" fill="#5BA7D1" fill-opacity="0.4"/>
    <!-- LED -->
    <circle cx="313" cy="234" r="3" fill="#10B981"/>
    <circle cx="313" cy="234" r="5" fill="#10B981" fill-opacity="0.3"/>
  </g>
  <text x="265" y="218" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">Speicher</text>
  <text x="265" y="312" fill="#9CA3AF" font-size="10" text-anchor="middle">hält die Energie bereit</text>

  <!-- Box 3 — UMSCHALTBOX (Hervorgehoben) -->
  <g>
    <!-- Glow drumherum -->
    <rect x="335" y="215" width="170" height="90" rx="10" fill="url(#bm-hilite)" opacity="0.7"/>
    <!-- Box -->
    <rect x="345" y="225" width="150" height="70" rx="6" fill="#0F2530" stroke="#5BA7D1" stroke-width="2.5"/>
    <!-- Symbol: Schalter mit zwei Positionen -->
    <!-- Eingang vom Speicher (links) -->
    <circle cx="365" cy="260" r="4" fill="#5BA7D1"/>
    <!-- Schalter-Hebel (in Inselposition: nach unten zum Haus) -->
    <line x1="365" y1="260" x2="430" y2="278" stroke="#5BA7D1" stroke-width="3" stroke-linecap="round"/>
    <!-- Ausgang Netz (oben rechts, inaktiv/grau) -->
    <circle cx="465" cy="245" r="4" fill="none" stroke="#6B7280" stroke-width="2"/>
    <text x="470" y="247" fill="#6B7280" font-size="9">Netz</text>
    <!-- Ausgang Haus (unten rechts, aktiv) -->
    <circle cx="465" cy="278" r="4" fill="#10B981"/>
    <text x="470" y="282" fill="#10B981" font-size="9" font-weight="700">Insel</text>
    <!-- Indikator-LED grün -->
    <circle cx="478" cy="234" r="3" fill="#10B981"/>
    <circle cx="478" cy="234" r="5" fill="#10B981" fill-opacity="0.3"/>
  </g>
  <text x="420" y="218" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">Umschaltbox</text>
  <text x="420" y="316" fill="#5BA7D1" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.1em">— DER CLOU —</text>

  <!-- =========== PFEILE ENERGIEFLUSS =========== -->
  <!-- Solarmodul → Wechselrichter (große Kurve) -->
  <path d="M 590 130 C 380 145 220 185 130 225" stroke="#8AC6E8" stroke-width="2.4" fill="none" marker-end="url(#bm-ah)"/>
  <circle cx="370" cy="148" r="2.5" fill="#8AC6E8"/>
  <circle cx="270" cy="175" r="2" fill="#8AC6E8" opacity="0.7"/>

  <!-- WR → Speicher -->
  <line x1="185" y1="260" x2="202" y2="260" stroke="#8AC6E8" stroke-width="2.4" marker-end="url(#bm-ah)"/>

  <!-- Speicher → Umschaltbox -->
  <line x1="325" y1="260" x2="343" y2="260" stroke="#8AC6E8" stroke-width="2.4" marker-end="url(#bm-ah)"/>

  <!-- Umschaltbox → Haus -->
  <path d="M 495 260 Q 560 250 600 215" stroke="#8AC6E8" stroke-width="2.4" fill="none" marker-end="url(#bm-ah)"/>

  <!-- =========== STROM-MAST RECHTS =========== -->
  <g stroke="#6B7280" stroke-width="2" fill="none">
    <line x1="845" y1="90" x2="845" y2="325"/>
    <line x1="822" y1="110" x2="868" y2="110"/>
    <line x1="822" y1="125" x2="868" y2="125"/>
    <line x1="836" y1="318" x2="845" y2="325"/>
    <line x1="854" y1="318" x2="845" y2="325"/>
  </g>
  <g fill="#6B7280">
    <circle cx="828" cy="112" r="1.8"/>
    <circle cx="845" cy="112" r="1.8"/>
    <circle cx="862" cy="112" r="1.8"/>
  </g>
  <text x="845" y="82" fill="#FFFFFF" font-size="12" font-weight="700" text-anchor="middle">Stromnetz</text>

  <!-- Stromleitung vom Mast zur Umschaltbox (gestrichelt) -->
  <path d="M 825 120 Q 700 175 500 250" stroke="#6B7280" stroke-width="1.6" stroke-dasharray="4 4" fill="none"/>

  <!-- ✕ -->
  <circle cx="660" cy="172" r="15" fill="#1F2021" stroke="#EF4444" stroke-width="2.4"/>
  <line x1="652" y1="164" x2="668" y2="180" stroke="#EF4444" stroke-width="2.6"/>
  <line x1="668" y1="164" x2="652" y2="180" stroke="#EF4444" stroke-width="2.6"/>
  <text x="660" y="200" fill="#EF4444" font-size="10" font-weight="700" text-anchor="middle">Netz aus</text>
</svg>
